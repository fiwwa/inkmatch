        function getDeviceSelectionHtml() {
            const generateDeviceGroup = (title, filterFn) => {

                if(filtered.length === 0) return '';
                
                let optionsHtml = filtered.map(device => `

            return `

                    <div class="flex-grow pb-10">

        function selectDevice(id) {
            state.targetDeviceId = id;
            render();

        function getQuestionHtml(currentQuestions) {
            const q = currentQuestions[state.currentQuestionIndex];
            const progress = ((state.currentQuestionIndex) / currentQuestions.length) * 100;

            let optionsHtml = q.options.map((opt, index) => {
                const valStr = typeof opt.value === 'string' ? `'${opt.value}'` : opt.value;
                return `
                <button onclick="answerQuestion(${valStr})" class="w-full text-left p-5 rounded-2xl border-2 border-duckegg hover:border-basil hover:bg-lightgreen/20 transition-all duration-200 group bg-white shadow-sm hover:shadow-md">

            return `

                        </button>
                        <span class="text-sm font-bold text-basil/60 bg-duckegg/30 px-3 py-1 rounded-xl">

                    <div class="w-full bg-duckegg/40 rounded-full h-3 mb-10 overflow-hidden shrink-0">
                        <div class="bg-hydrangea h-3 rounded-full transition-all duration-500" style="width: ${progress}%"></div>
                    </div>
                    
                    <h2 class="text-2xl sm:text-3xl font-bold text-basil mb-8 leading-tight shrink-0">
                        ${t(q.q)}
                    </h2>
                    
                    <div class="space-y-4 flex-grow pb-10">
                        ${optionsHtml}
                    </div>

            `;
        }

        function answerQuestion(value) {
            const currentQuestions = state.path === 'need' ? needQuestions : questions;
            const currentQ = currentQuestions[state.currentQuestionIndex];
            
            state.answers[currentQ.id] = value;
            state.currentQuestionIndex++;
            render();
        }

        function goBackQuestion() {
            if (state.currentQuestionIndex > 0) {
                state.currentQuestionIndex--;
                render();
            } else {
                if (state.path === 'check' && state.targetDeviceId) {
                    state.targetDeviceId = null;
                    render();
                } else {
                    resetApp();
                }
            }
        }

        function calculateMatches() {
            let scores = ereaders.map(device => {
                let score = 0; 
                let maxPossible = 0;
                let reasons = []; 
                let drawbacks = []; 

                const evaluate = (weight, condition, matchReason, failReason) => {
                    maxPossible += weight;
                    if (condition) {
                        score += weight;
                        if(matchReason) reasons.push(matchReason);
                    } else {
                        if(failReason) drawbacks.push(failReason);
                    }
                };

                // 1. Source Ecosystem
                if (state.answers.source === 'amazon') {
                    evaluate(25, device.specs.ecosystem === 'amazon', "Seamless Amazon Store integration", "Not a Kindle, buying Amazon books is harder");
                } else if (state.answers.source === 'kobo') {
                    evaluate(25, device.specs.ecosystem === 'kobo', "Seamless Kobo Store integration", "Not a Kobo, buying Kobo books is harder");
                } else if (state.answers.source === 'android') {
                    evaluate(25, device.specs.android === true, "Full access to local Android apps like iPusnas", "Cannot install local Android reading apps natively");
                } else if (state.answers.source === 'libby') {
                    evaluate(15, device.specs.ecosystem === 'kobo' || device.specs.android, "Good Libby integration capabilities", "Amazon outside US doesn't support Libby easily");
                } else if (state.answers.source === 'sideload') {
                    evaluate(20, device.specs.ecosystem === 'android' || device.specs.ecosystem === 'kobo', "Easy to sideload and manage EPUBs", "Kindle requires 'Send to Kindle' conversion for EPUBs");
                } else if (state.answers.source === 'mixed') {
                    evaluate(25, device.specs.android === true, "Android allows access to multiple stores and formats", "Locked into a specific brand ecosystem");
                }

                // 2. Content / Color
                if (state.answers.content === 'color') {
                    evaluate(20, device.specs.color === true, "Color screen for comics and covers", "Black and white screen only");
                } else if (state.answers.content === 'manga' || state.answers.content === 'pdf') {
                    evaluate(15, device.specs.size === 'bigger', "Larger screen ideal for formatting", "Screen might be too small for complex layouts");
                    if(state.answers.content === 'manga') evaluate(5, !device.specs.color, "Crisp B&W contrast for manga");
                } else if (state.answers.content === 'text') {
                    evaluate(10, !device.specs.color, "Sharper contrast with standard B&W screen", "Color screens can look slightly darker for pure text");
                }

                // 3. Size Preference
                if (state.answers.size === 'compact') {
                    evaluate(15, device.specs.size === 'compact', "Compact and lightweight design", "Larger and heavier than preferred");
                } else if (state.answers.size === 'bigger') {
                    evaluate(15, device.specs.size === 'bigger', "Comfortable, book-like reading area", "Smaller screen than requested");
                }

                // 4. Waterproofing
                if (state.answers.waterproof === 'essential') {
                    evaluate(15, device.specs.waterproof === true, "Fully waterproof for reading anywhere", "Not waterproof");
                } else if (state.answers.waterproof === 'nice') {
                    evaluate(5, device.specs.waterproof === true, "Has bonus waterproofing");
                }

                // 5. Buttons
                if (state.answers.buttons === 'buttons') {
                    evaluate(10, device.specs.buttons === true, "Has physical page-turn buttons", "Lacks physical buttons");
                } else if (state.answers.buttons === 'touch') {
                    evaluate(10, device.specs.buttons === false, "Streamlined touchscreen-only design");
                }

                // 6. Library/Libby
                if (state.answers.library === 'one') {
                    evaluate(15, device.specs.libby === 'one' || device.specs.android, "Supports your library needs", "Might not support Libby directly");
                } else if (state.answers.library === 'multiple') {
                    evaluate(15, device.specs.android || device.specs.ecosystem === 'amazon', "Can handle multiple library sources/cards", "Kobo natively only supports one active Libby card");
                }

                // 7. Stylus / Notes
                if (state.answers.notes === 'yes') {
                    evaluate(15, device.specs.stylus === true, "Supports stylus input for handwritten notes", "Cannot take handwritten notes");
                }

                // 8. Wireless Charging
                if (state.answers.wireless === 'yes') {
                    evaluate(5, device.specs.wirelessCharging === true, "Supports convenient wireless charging", "Requires a cable to charge");
                }

                // 9. Storage
                const isHighStorage = device.specs.storage.includes('32GB') || device.specs.storage.includes('64GB') || device.specs.storage.includes('128GB');
                if (state.answers.storage_count === 'high' || state.answers.storage_count === 'max') {
                    evaluate(10, isHighStorage, "High storage capacity for large libraries", "Base storage might fill up quickly");
                } else if (state.answers.storage_count === 'low') {
                    evaluate(5, !isHighStorage, "Cost-effective storage size"); 
                }

                // 10. Budget
                let budgetVal = 2; 
                if(device.priceRange.includes('< Rp 2.000.000')) budgetVal = 1;
                if(device.priceRange.includes('> Rp 3.500.000')) budgetVal = 3;
                
                if (state.answers.budget !== undefined) {
                    if (budgetVal <= state.answers.budget) {
                        score += 10; 
                        maxPossible += 10;
                        reasons.push("Fits within your budget");
                    } else {
                        score -= 20; 
                        drawbacks.push("Exceeds your requested budget");
                    }
                }

                let percentage = maxPossible > 0 ? Math.round((score / maxPossible) * 100) : 50;
                percentage = Math.max(0, Math.min(100, percentage)); 

                if(reasons.length === 0) reasons.push("Overall solid device");
                if(drawbacks.length === 0) drawbacks.push("No major conflicts with your preferences");

                reasons = [...new Set(reasons)].slice(0, 4);
                drawbacks = [...new Set(drawbacks)].slice(0, 3);

                return { ...device, score: percentage, matchReasons: reasons, matchDrawbacks: drawbacks };
            });

            return scores.sort((a, b) => b.score - a.score);
        }

        function getFindResultHtml() {
            const ranked = calculateMatches();
            const topPick = ranked[0];
            const runnerUps = ranked.slice(1, 4);

            return `
                <div class="fade-in flex flex-col h-full overflow-y-auto custom-scrollbar pr-2 pb-6">
                    <div class="text-center mb-8 shrink-0">
                        <h2 class="text-3xl sm:text-4xl font-bold text-basil leading-tight mb-2">${t(ui.matchTitle)} ${state.name}!</h2>
                        <p class="text-basil/70 mt-2">${t(ui.findResultsSub)}</p>
                    </div>

                    <div class="bg-duckegg/10 rounded-[2rem] p-6 md:p-8 shadow-xl border-2 border-duckegg mb-10 flex flex-col lg:flex-row items-center lg:items-start gap-8 relative shrink-0">
                        <div class="absolute top-0 right-0 bg-basil text-white text-xs font-bold px-5 py-2.5 rounded-bl-3xl rounded-tr-[1.8rem] z-10 tracking-widest shadow-sm">${t(ui.bestMatch)}</div>
                        
                        <div class="w-full lg:w-1/3 shrink-0 flex flex-col items-center justify-center pt-6 lg:pt-0">
                            <div class="relative">
                                <img src="${topPick.image}" alt="${topPick.name}" class="w-56 h-72 sm:w-64 sm:h-80 object-contain rounded-xl p-2 sm:p-4 bg-white shadow-md border-4 border-white mx-auto">
                                <div class="absolute -bottom-5 -right-5 bg-lightgreen border-4 border-white text-basil font-bold text-2xl rounded-full w-20 h-20 flex items-center justify-center shadow-lg">
                                    ${topPick.score}%
                                </div>
                            </div>
                        </div>
                        
                        <div class="flex-1 flex flex-col w-full min-w-0">
                            <h3 class="text-3xl sm:text-4xl font-bold text-basil text-center sm:text-left mb-2 leading-tight">${topPick.name}</h3>
                            <p class="text-basil/80 font-bold text-lg text-center sm:text-left mb-6 tracking-wide">${topPick.priceRange}</p>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">
                                <div class="bg-lightgreen/10 p-5 rounded-2xl border border-lightgreen/30">
                                    <h4 class="text-sm font-bold text-basil mb-3 flex items-center uppercase tracking-wider">
                                        <svg class="w-4 h-4 mr-1.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> 
                                        ${t(ui.whySuits)}
                                    </h4>
                                    <ul class="text-sm text-basil space-y-2">
                                        ${topPick.matchReasons.map(r => `<li class="flex items-start"><span class="mr-2 text-basil font-bold">•</span><span class="leading-tight">${r}</span></li>`).join('')}
                                    </ul>
                                </div>
                                <div class="bg-strawberry/10 p-5 rounded-2xl border border-strawberry/30">
                                    <h4 class="text-sm font-bold text-basil mb-3 flex items-center uppercase tracking-wider">
                                        <svg class="w-4 h-4 mr-1.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg> 
                                        ${t(ui.drawbacks)}
                                    </h4>
                                    <ul class="text-sm text-basil space-y-2">
                                        ${topPick.matchDrawbacks.map(c => `<li class="flex items-start"><span class="mr-2 text-strawberry font-bold">•</span><span class="leading-tight">${c}</span></li>`).join('')}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>

                    <h3 class="text-xl font-bold text-basil mb-5 text-center sm:text-left shrink-0">${t(ui.otherOptions)}</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-5 shrink-0">
                        ${runnerUps.map(device => `
                            <div class="bg-white rounded-3xl p-5 border-2 border-duckegg flex flex-col items-center text-center shadow-sm hover:shadow-md transition-all relative overflow-hidden group">
                                <div class="absolute top-0 right-0 bg-hydrangea text-white text-base font-bold px-4 py-1.5 rounded-bl-2xl z-10 shadow-sm">${device.score}%</div>
                                <img src="${device.image}" alt="${device.name}" class="w-20 h-24 object-contain rounded-xl mb-4 bg-gray-50 p-1 group-hover:scale-105 transition-transform">
                                <h4 class="font-bold text-basil text-sm mb-1 leading-tight h-10 flex items-center">${device.name}</h4>
                                <button onclick="openModal('${device.id}')" class="mt-4 text-xs font-bold text-basil bg-duckegg/40 hover:bg-duckegg px-4 py-2 rounded-xl transition-colors w-full">View Details</button>
                            </div>
                        `).join('')}
                    </div>

                    <button onclick="resetApp()" class="mt-12 mx-auto bg-basil hover:bg-basil/90 text-white font-bold py-4 px-10 rounded-2xl transition-colors shadow-md shrink-0">
                        ${t(ui.startOver)}
                    </button>
                </div>
            `;
        }

        function getCheckResultHtml() {
            const ranked = calculateMatches();
            const device = ranked.find(d => d.id === state.targetDeviceId);
            
            const likes = device.matchReasons.length > 0 ? device.matchReasons : [state.lang === 'en' ? "Fits your basic criteria" : "Sesuai kriteria dasarmu"];
            const dislikes = device.matchDrawbacks.length > 0 ? device.matchDrawbacks : [state.lang === 'en' ? "No major conflicts found" : "Tidak ada konflik besar"];
            const score = device.score;
            
            let scoreColor = score >= 80 ? 'bg-lightgreen' : score >= 50 ? 'bg-hydrangea/60' : 'bg-strawberry';

            setTimeout(() => {
                const bar = document.getElementById('scoreBar');
                const txt = document.getElementById('scoreText');
                if(bar && txt) {
                    bar.style.width = `${score}%`;
                    txt.innerText = `${score}% MATCH`;
                }
            }, 100);

            return `
                <div class="fade-in flex flex-col h-full overflow-y-auto custom-scrollbar pr-2 pb-6">
                    <div class="text-center mb-8 shrink-0">
                        <h2 class="text-3xl sm:text-4xl font-bold text-basil leading-tight">${t(ui.resultsTitle)} ${state.name}</h2>
                        <p class="text-basil/70 mt-2">${t(ui.resultsSub)}</p>
                    </div>

                    <div class="flex flex-col sm:flex-row items-center justify-center gap-8 mb-12 relative bg-duckegg/10 p-8 rounded-[2rem] border-2 border-duckegg shadow-sm shrink-0">
                        <img src="${device.image}" alt="${device.name}" class="w-48 h-auto object-contain p-2 bg-white rounded-2xl shadow-md border-4 border-white shrink-0">
                        <div class="flex flex-col items-center sm:items-start w-full max-w-md">
                            <h3 class="text-3xl sm:text-4xl font-bold text-basil mb-6 text-center sm:text-left leading-tight">${device.name}</h3>
                            <div class="w-full bg-duckegg/30 rounded-full h-12 border-2 border-duckegg shadow-inner p-1.5 relative overflow-hidden">
                                <div class="${scoreColor} h-full rounded-full transition-all duration-1000 ease-out" style="width: 0%;" id="scoreBar"></div>
                                <div class="absolute inset-0 flex items-center justify-center font-bold text-base text-basil tracking-widest z-10" id="scoreText">0% MATCH</div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 shrink-0">
                        <div class="bg-white rounded-3xl p-6 border-2 border-lightgreen shadow-sm">
                            <h4 class="font-bold text-basil mb-4 text-sm flex items-center bg-lightgreen/30 w-max px-3 py-1.5 rounded-xl uppercase tracking-wider">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10h4.764a2 2 0 011.789 2.894l-3.5 7A2 2 0 0115.263 21h-4.017c-.163 0-.326-.02-.485-.06L7 20m7-10V5a2 2 0 00-2-2h-.095c-.5 0-.905.405-.905.905 0 .714-.211 1.412-.608 2.006L7 11v9m7-10h-2M7 20H5a2 2 0 01-2-2v-6a2 2 0 012-2h2.5"></path></svg> 
                                ${t(ui.loveIt)}
                            </h4>
                            <ul class="space-y-3">
                                ${likes.map(l => `<li class="flex items-start text-sm"><span class="text-basil mr-2 font-bold shrink-0">•</span><span class="text-basil leading-tight">${l}</span></li>`).join('')}
                            </ul>
                        </div>
                        <div class="bg-white rounded-3xl p-6 border-2 border-strawberry shadow-sm">
                            <h4 class="font-bold text-basil mb-4 text-sm flex items-center bg-strawberry/30 w-max px-3 py-1.5 rounded-xl uppercase tracking-wider">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14H5.236a2 2 0 01-1.789-2.894l3.5-7A2 2 0 018.736 3h4.018a2 2 0 01.485.06l3.76.94m-7 10v5a2 2 0 002 2h.096c.5 0 .905-.405.905-.904 0-.715.211-1.413.608-2.008L17 13V4m-7 10h2m5-10h2a2 2 0 012 2v6a2 2 0 01-2 2h-2.5"></path></svg>
                                ${t(ui.botherIt)}
                            </h4>
                            <ul class="space-y-3">
                                ${dislikes.map(d => `<li class="flex items-start text-sm"><span class="text-strawberry mr-2 font-bold shrink-0">•</span><span class="text-basil leading-tight">${d}</span></li>`).join('')}
                            </ul>
                        </div>
                    </div>

                    <button onclick="resetApp()" class="mt-10 mx-auto bg-basil hover:bg-basil/90 text-white font-bold py-4 px-10 rounded-2xl transition-colors shadow-md shrink-0">
                        ${t(ui.tryAnother)}
                    </button>
                </div>
            `;
        }

        function getNeedResultHtml() {
            let score = 0;
            for (let key in state.answers) {
                if(typeof state.answers[key] === 'number') {
                    score += state.answers[key];
                }
            }
            const needsEreader = score >= 12; // Adjusted threshold for 15 questions
            const hasTBR = state.answers['storage'] === 2; // Overflowing storage = TBR warning

            const title = needsEreader ? ui.needYesTitle : ui.needNoTitle;
            const desc = needsEreader ? ui.needYesDesc : ui.needNoDesc;
            const btnText = needsEreader ? ui.needYesBtn : ui.needNoBtn;
            const btnAction = needsEreader ? "startFlow('find')" : "startFlow('check')";
            
            const iconColor = needsEreader ? 'bg-lightgreen' : 'bg-strawberry';
            const iconSvg = needsEreader 
                ? `<svg class="w-12 h-12 text-basil" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`
                : `<svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
            
            const tbrNote = hasTBR ? `<p class="mt-4 text-basil/90 font-medium italic">${t(ui.tbrMessage)}</p>` : '';

            return `
                <div class="fade-in flex flex-col h-full py-10 items-center justify-center overflow-y-auto">
                    
                    <div class="flex flex-col sm:flex-row items-center sm:items-start text-center sm:text-left max-w-2xl w-full gap-6 bg-duckegg/10 p-8 rounded-[2rem] border-2 border-duckegg shadow-sm mb-8 shrink-0">
                        <div class="w-24 h-24 sm:w-32 sm:h-32 rounded-full ${iconColor} border-4 border-white flex items-center justify-center shadow-lg shrink-0">
                            ${iconSvg}
                        </div>
                        <div class="flex-1">
                            <h2 class="text-3xl sm:text-4xl font-bold text-basil mb-4 leading-tight">${t(title)}</h2>
                            <div class="text-basil/80 text-lg mb-6">
                                ${t(desc)}
                                ${tbrNote}
                            </div>
                            <button onclick="${btnAction}" class="bg-basil hover:bg-basil/90 text-white font-bold py-4 px-8 rounded-2xl transition-all shadow-md transform hover:-translate-y-1 inline-block w-full sm:w-auto text-center">
                                ${t(btnText)}
                            </button>
                        </div>
                    </div>

                    <button onclick="resetApp()" class="text-basil/60 hover:text-basil font-medium transition-colors flex items-center shrink-0">
                        <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> ${t(ui.back)}
                    </button>
                </div>
            `;
        }

        function openModal(deviceId) {
            const device = ereaders.find(d => d.id === deviceId);
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            
            let pros = [];
            let cons = [];
            
            if(device.specs.color) pros.push("Color Display");
            if(device.specs.waterproof) pros.push("Waterproof");
            if(device.specs.buttons) pros.push("Physical Buttons");
            if(device.specs.android) pros.push("Install Android Apps");
            if(device.specs.wirelessCharging) pros.push("Wireless Charging");
            
            if(device.specs.battery === 'short') cons.push("Shorter battery life");
            if(device.specs.ecosystem === 'amazon') cons.push("Locked to Amazon store");
            if(!device.specs.waterproof) cons.push("Not waterproof");

            if(pros.length === 0) pros.push("Solid standard e-reader");
            if(cons.length === 0) cons.push("No major flaws");

            content.innerHTML = `
                <button onclick="closeModal()" class="absolute top-4 right-4 text-basil hover:text-strawberry transition-colors bg-white rounded-full p-1 shadow-sm z-10">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                <div class="flex justify-center bg-gray-50 rounded-2xl mb-6 p-4 border-2 border-duckegg">
                    <img src="${device.image}" alt="${device.name}" class="h-40 object-contain shadow-sm rounded-xl bg-white p-2">
                </div>
                <h3 class="text-2xl font-bold text-basil mb-1 text-center">${device.name}</h3>
                <div class="text-center mb-6">
                    <p class="text-sm bg-duckegg/40 text-basil px-3 py-1.5 rounded-xl inline-block font-bold">${device.priceRange}</p>
                </div>
                
                <div class="space-y-4">
                    <div class="bg-lightgreen/20 p-4 rounded-2xl">
                        <h4 class="font-bold text-basil uppercase text-xs mb-2 tracking-widest">Key Features</h4>
                        <ul class="text-sm text-basil space-y-1">
                            ${pros.map(p => `<li class="flex"><span class="text-basil font-bold mr-2">+</span> ${p}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="bg-strawberry/10 p-4 rounded-2xl">
                        <h4 class="font-bold text-basil uppercase text-xs mb-2 tracking-widest">Keep in mind</h4>
                        <ul class="text-sm text-basil space-y-1">
                            ${cons.map(c => `<li class="flex"><span class="text-strawberry font-bold mr-2">-</span> ${c}</li>`).join('')}
                        </ul>
                    </div>
                </div>
            `;
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                content.classList.add('modal-enter');
                modal.classList.remove('opacity-0');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                document.getElementById('modal-content').classList.remove('modal-enter');
            }, 300);
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                closeModal();
            }
        });

        function resetApp() {
            state = {
                lang: state.lang,
                name: state.name,
                path: null,
                targetDeviceId: null,
                currentQuestionIndex: 0,
                answers: {}
            };
            render();
        }

        render();
    </script>
</body>
</html>
