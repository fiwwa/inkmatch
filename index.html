        function selectDevice(id) {
            const idx = state.targetDeviceIds.indexOf(id);
            if (idx > -1) {

            state.checkStarted = true;

        function getQuestionHtml(currentQuestions) {
            const q = currentQuestions[state.currentQuestionIndex];
            const progress = ((state.currentQuestionIndex) / currentQuestions.length) * 100;

            let optionsHtml = q.options.map((opt, index) => {
                const valStr = typeof opt.value === 'string' ? `'${opt.value}'` : opt.value;

                            <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> ${t(ui.back)}

                        <div class="bg-hydrangea h-3 rounded-full transition-all duration-500" style="width: ${progress}%"></div>

                    </div>
                </div>
            `;
        }

        function answerQuestion(value) {
            const currentQuestions = state.path === 'need' ? needQuestions : questions;
            const currentQ = currentQuestions[state.currentQuestionIndex];
            
            state.answers[currentQ.id] = value;
            state.currentQuestionIndex++;
            render();
        }

        function goBackQuestion() {
            if (state.currentQuestionIndex > 0) {
                state.currentQuestionIndex--;
                render();
            } else {
                if (state.path === 'check' && state.checkStarted) {
                    state.checkStarted = false;
                    render();
                } else {
                    resetApp();
                }
            }
        }

        function calculateMatches() {
            let scores = ereaders.map(device => {
                let score = 0; 
                let maxPossible = 0;
                let reasons = []; 
                let drawbacks = []; 

                const evaluate = (weight, condition, matchReason, failReason) => {
                    maxPossible += weight;
                    if (condition) {
                        score += weight;
                        if(matchReason && !reasons.includes(matchReason)) reasons.push(matchReason);
                    } else {
                        if(failReason && !drawbacks.includes(failReason)) drawbacks.push(failReason);
                    }
                };

                // 1. Source Ecosystem
                if (state.answers.source === 'amazon') evaluate(25, device.specs.ecosystem === 'amazon', "Seamless Amazon Store integration", "Buying Amazon books requires extra steps");
                else if (state.answers.source === 'kobo') evaluate(25, device.specs.ecosystem === 'kobo', "Seamless Kobo Store integration", "Buying Kobo books requires extra steps");
                else if (state.answers.source === 'android') evaluate(25, device.specs.android === true, "Full access to local Android apps like iPusnas", "Cannot install local Android reading apps natively");
                else if (state.answers.source === 'libby') evaluate(15, device.specs.ecosystem === 'kobo' || device.specs.android, "Good Libby integration capabilities", "Amazon outside US doesn't support Libby easily");
                else if (state.answers.source === 'sideload') evaluate(20, device.specs.ecosystem === 'android' || device.specs.ecosystem === 'kobo' || device.specs.ecosystem === 'amazon', "Easy to sideload and sync EPUBs (via Send to Kindle for Amazon)", null);
                else if (state.answers.source === 'mixed') evaluate(25, device.specs.android === true, "Android allows access to multiple stores and formats", "Locked into a specific brand ecosystem");

                // 2. Content / Color
                if (state.answers.content === 'color') evaluate(20, device.specs.color === true, "Color screen for comics and covers", "Black and white screen only");
                else if (state.answers.content === 'manga_comic') {
                    evaluate(15, device.specs.size === 'bigger', "Larger screen ideal for formatting", "Screen might be too small for complex layouts");
                    if (device.specs.color) evaluate(5, true, "Color brings covers to life", null);
                } 
                else if (state.answers.content === 'pdf') evaluate(15, device.specs.size === 'bigger', "Larger screen ideal for formatting", "Screen might be too small for complex layouts");
                else if (state.answers.content === 'text') evaluate(10, !device.specs.color, "Sharper contrast with standard B&W screen", "Color screens can look slightly darker for pure text");

                // 3. Size Preference
                if (state.answers.size === 'compact') evaluate(15, device.specs.size === 'compact', "Compact and lightweight design", "Larger and heavier than preferred");
                else if (state.answers.size === 'bigger') evaluate(15, device.specs.size === 'bigger', "Comfortable, book-like reading area", "Smaller screen than requested");

                // 4. Waterproofing
                if (state.answers.waterproof === 'essential') evaluate(15, device.specs.waterproof === true, "Fully waterproof for reading anywhere", "Not waterproof");
                else if (state.answers.waterproof === 'nice') {
                    if (device.specs.waterproof) evaluate(5, true, "Has bonus waterproofing", null);
                }

                // 5. Buttons
                if (state.answers.buttons === 'buttons') evaluate(10, device.specs.buttons === true, "Has physical page-turn buttons", "Lacks physical buttons");
                else if (state.answers.buttons === 'touch') evaluate(10, device.specs.buttons === false, "Streamlined touchscreen-only design", null);

                // 6. Library/Libby
                if (state.answers.library === 'one') evaluate(15, device.specs.libby === 'one' || device.specs.android || device.specs.libby === 'multiple', "Supports your library needs", "Might not support Libby directly");
                else if (state.answers.library === 'multiple') evaluate(15, device.specs.android || device.specs.ecosystem === 'amazon', "Can handle multiple library sources/cards", "Kobo natively only supports one active Libby card");

                // 7. Stylus / Notes
                if (state.answers.notes === 'yes') evaluate(15, device.specs.stylus === true, "Supports stylus input for handwritten notes", "Cannot take handwritten notes");

                // 8. Wireless Charging
                if (state.answers.wireless === 'yes') evaluate(5, device.specs.wirelessCharging === true, "Supports convenient wireless charging", "Requires a cable to charge");
                
                // 10. Reading Time (Battery)
                if (state.answers.reading_time === 'long') evaluate(15, device.specs.battery === 'long', "Excellent battery life for long sessions", "Battery might need more frequent charging");
                else if (state.answers.reading_time === 'short') {
                    if(device.specs.battery !== 'long') evaluate(5, true, "Sufficient battery for casual reading", null);
                }

                // 11. Tracker Logic
                if (state.answers.tracker === 'goodreads') {
                    evaluate(10, device.specs.ecosystem === 'amazon' || device.specs.android, "Goodreads integration supported", "No built-in Goodreads sync");
                } else if (state.answers.tracker === 'storygraph') {
                    evaluate(10, device.specs.ecosystem === 'kobo' || device.specs.android, "Storygraph integration supported", "No built-in Storygraph sync");
                } else if (state.answers.tracker === 'other') {
                    evaluate(10, device.specs.android === true, "Can install third-party tracking apps", "Locked ecosystem limits tracking apps");
                }

                // Device Age Preference
                if (state.answers.device_age === 'new') {
                    evaluate(15, device.specs.age === 'new' || device.specs.age === 'mid', "Newer device, better longevity", "Older device, might stop receiving updates soon");
                } else if (state.answers.device_age === 'old') {
                    if (device.specs.age === 'old') evaluate(5, true, "Older device (easier to jailbreak if needed)", null);
                }

                // 12. Budget
                if (state.answers.budget !== undefined) {
                    maxPossible += 30; 
                    if (device.specs.budget <= state.answers.budget) {
                        score += 30;
                        reasons.push("Fits comfortably within your budget");
                    } else {
                        drawbacks.push("Exceeds your requested budget significantly");
                    }
                }

                if (device.specs.extra && device.specs.extra.includes('Google Drive & Dropbox integration')) {
                    reasons.push("Built-in Google Drive & Dropbox integration");
                }
                
                let percentage = maxPossible > 0 ? Math.round((score / maxPossible) * 100) : 0;
                percentage = Math.max(0, Math.min(100, percentage)); 

                if(reasons.length === 0) reasons.push("Overall solid device");
                if(drawbacks.length === 0) drawbacks.push("No major conflicts with your preferences");

                reasons = [...new Set(reasons)].slice(0, 4);
                drawbacks = [...new Set(drawbacks)].slice(0, 3);

                return { ...device, score: percentage, matchReasons: reasons, matchDrawbacks: drawbacks };
            });

            return scores.sort((a, b) => b.score - a.score);
        }

            const ranked = calculateMatches();
            const topPick = ranked[0];
            const runnerUps = ranked.slice(1, 4);

            return `

                    <h3 class="text-xl font-bold text-basil mb-5 text-center sm:text-left shrink-0">${t(ui.otherOptions)}</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-5 shrink-0">
                        ${runnerUps.map(device => `
                            <div class="bg-white rounded-3xl p-5 border-2 border-duckegg flex flex-col items-center text-center shadow-sm hover:shadow-md transition-all relative overflow-hidden group">
                                <div class="absolute top-0 right-0 bg-hydrangea text-white text-base font-bold px-4 py-1.5 rounded-bl-2xl z-10 shadow-sm">${device.score}%</div>

                const matchMessageHtml = total === 1 ? `<p class="text-base sm:text-lg font-medium text-basil/70 mb-4 text-center sm:text-left leading-tight">${matchText}</p>` : '';

                            <div class="flex flex-col items-center sm:items-start w-full ${total === 2 ? 'h-full justify-center' : ''}">

        function getNeedResultHtml() {
            let score = 0;
            for (let key in state.answers) {
                if(typeof state.answers[key] === 'number') {
                    score += state.answers[key];
                }
            }
            const needsEreader = score >= 12; 

            const title = needsEreader ? ui.needYesTitle : ui.needNoTitle;
            const desc = needsEreader ? ui.needYesDesc : ui.needNoDesc;
            const btnText = needsEreader ? ui.needYesBtn : ui.needNoBtn;
            const btnAction = needsEreader ? "startFlow('find')" : "startFlow('check')";
            
            const iconColor = needsEreader ? 'bg-lightgreen' : 'bg-strawberry';
            const iconSvg = needsEreader 
                ? `<svg class="w-16 h-16 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`
                : `<svg class="w-16 h-16 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;
            
            return `
                <div class="fade-in flex flex-col h-full py-10 items-center justify-center overflow-y-auto">
                    
                    <div class="flex flex-col sm:flex-row items-center sm:items-start text-center sm:text-left max-w-2xl w-full gap-8 bg-duckegg/10 p-8 rounded-[2rem] border-2 border-duckegg shadow-sm mb-8 shrink-0">
                        <div class="w-28 h-28 sm:w-36 sm:h-36 rounded-full ${iconColor} border-4 border-white flex items-center justify-center shadow-lg shrink-0">
                            ${iconSvg}
                        </div>
                        <div class="flex-1 flex flex-col justify-center h-full pt-2">
                            <h2 class="text-3xl sm:text-4xl font-bold text-basil mb-4 leading-tight">${t(title)}</h2>
                            <div class="text-basil/80 text-lg mb-8">
                                ${t(desc)}
                            </div>
                            <button onclick="${btnAction}" class="font-sunshiney text-lg sm:text-xl tracking-wider bg-basil hover:bg-basil/90 text-white py-3 px-6 rounded-2xl transition-all shadow-md transform hover:-translate-y-1 inline-block w-full sm:w-auto text-center mt-auto">
                                ${t(btnText)}
                            </button>
                        </div>
                    </div>

                    <button onclick="resetApp()" class="text-basil/60 hover:text-basil font-medium transition-colors flex items-center shrink-0 text-sm">
                        <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> ${t(ui.back)}
                    </button>
                </div>
            `;
        }

        function openModal(deviceId) {
            const device = ereaders.find(d => d.id === deviceId);
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            
            let pros = [];
            let cons = [];
            
            if(device.specs.color) pros.push("Color Display");
            if(device.specs.waterproof) pros.push("Waterproof");
            if(device.specs.buttons) pros.push("Physical Buttons");
            if(device.specs.android) pros.push("Install Android Apps");
            if(device.specs.wirelessCharging) pros.push("Wireless Charging");
            
            if(device.specs.battery === 'short') cons.push("Shorter battery life");
            if(device.specs.ecosystem === 'amazon') cons.push("Locked to Amazon store");
            if(!device.specs.waterproof) cons.push("Not waterproof");

            if(pros.length === 0) pros.push("Solid standard e-reader");
            if(cons.length === 0) cons.push("No major flaws");

            content.innerHTML = `
                <button onclick="closeModal()" class="absolute top-4 right-4 text-basil hover:text-strawberry transition-colors bg-white rounded-full p-1 shadow-sm z-10">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                <div class="flex justify-center bg-gray-50 rounded-2xl mb-6 p-4 border-2 border-duckegg">
                    <img src="${device.image}" alt="${device.name}" class="h-40 object-contain shadow-sm rounded-xl bg-white p-2">
                </div>
                <h3 class="text-2xl font-bold text-basil mb-1 text-center">${device.name}</h3>
                <div class="text-center mb-6">
                    <p class="text-sm bg-duckegg/40 text-basil px-3 py-1.5 rounded-xl inline-block font-bold">${device.priceRange}</p>
                </div>
                
                <div class="space-y-4">
                    <div class="bg-lightgreen/20 p-4 rounded-2xl">
                        <h4 class="font-bold text-basil uppercase text-xs mb-2 tracking-widest">Key Features</h4>
                        <ul class="text-sm text-basil space-y-1">
                            ${pros.map(p => `<li class="flex"><span class="text-basil font-bold mr-2">+</span> ${p}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="bg-strawberry/10 p-4 rounded-2xl">
                        <h4 class="font-bold text-basil uppercase text-xs mb-2 tracking-widest">Keep in mind</h4>
                        <ul class="text-sm text-basil space-y-1">
                            ${cons.map(c => `<li class="flex"><span class="text-strawberry font-bold mr-2">-</span> ${c}</li>`).join('')}
                        </ul>
                    </div>
                </div>
            `;
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                content.classList.add('modal-enter');
                modal.classList.remove('opacity-0');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                document.getElementById('modal-content').classList.remove('modal-enter');
            }, 300);
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                closeModal();
            }
        });

        function resetApp() {
            state = {
                lang: state.lang,
                name: state.name,
                path: null,
                targetDeviceIds: [],
                checkStarted: false,
                currentQuestionIndex: 0,
                answers: {}
            };
            render();
        }

        render();
    </script>
